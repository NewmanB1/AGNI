<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <script>
    // Redirect path-based URLs to hash routing (e.g. /author/login -> /#/author/login)
    (function(){
      var p = location.pathname;
      if (p !== '/' && p !== '/index.html' && !/\.(css|js|ico|png|jpg|svg|woff2?)$/i.test(p)) {
        location.replace('/#' + p + location.search);
      }
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>" />
  <meta name="theme-color" content="#1a1a2e" />
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body>
  <div class="app-root">
    <a href="#main-content" class="skip-link">Skip to content</a>

    <header class="app-header" role="banner">
      <a href="#/" class="logo">AGNI Portal</a>
      <button class="mobile-menu-toggle" aria-label="Toggle menu" aria-expanded="false" id="mobile-menu-btn">
        <span class="hamburger"></span>
      </button>
      <nav aria-label="Main navigation" id="main-nav">
        <a href="#/" data-nav="home">Home</a>
        <a href="#/learn" data-nav="learn">Learn</a>
        <a href="#/hub" data-nav="hub">Teacher Hub</a>
        <a href="#/hub/collab" data-nav="hub/collab">Collaborative Sessions</a>
        <a href="#/groups" data-nav="groups">Groups</a>
        <a href="#/students" data-nav="students">Students</a>
        <a href="#/author" data-nav="author">Author</a>
        <a href="#/author/browse" data-nav="author/browse">Browse</a>
        <a href="#/parent/dashboard" data-nav="parent">Parent</a>
        <a href="#/governance/setup" data-nav="governance">Governance</a>
        <a href="#/admin/hub" data-nav="admin">Admin</a>
        <a href="#/settings" data-nav="settings">Settings</a>
      </nav>
    </header>

    <main id="main-content"></main>
  </div>

  <script type="module" src="/js/main.js"></script>
</body>
</html>
