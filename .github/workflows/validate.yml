name: Validate OLS Files
on:
  push:
    branches: [main]
    paths:
      - 'lessons/**'
      - 'schemas/**'
      - 'fixtures/**'
      - 'src/**'
      - 'hub-tools/**'
      - 'packages/**'
      - 'server/**'
      - 'tests/**'
      - 'portal/**'
      - 'package.json'
  pull_request:
    paths:
      - 'lessons/**'
      - 'schemas/**'
      - 'fixtures/**'
      - 'src/**'
      - 'hub-tools/**'
      - 'packages/**'
      - 'server/**'
      - 'tests/**'
      - 'portal/**'
      - 'package.json'
  workflow_dispatch:
jobs:
  validate:
    name: Validate (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [14, 18]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Initialize data files
        run: npm run init:data
      - name: Audit dependencies for vulnerabilities
        run: npm audit --audit-level=high
      - name: Lint
        run: npm run lint
      - name: Format check
        run: npx prettier --check "src/**/*.{js,ts}" "hub-tools/**/*.js" "packages/**/*.js" "server/**/*.js" "tests/**/*.js"
      - name: Type check
        run: npm run typecheck
      - name: Validate JSON schemas load (Ajv)
        run: npm run codegen:validate-schemas
      - name: Run unit tests with coverage
        run: npm run test:coverage
      - name: Run integration tests
        run: npm run test:integration
      - name: Run contract tests
        run: npm run test:contract
      - name: Run graph verification tests
        run: npm run test:graph
      - name: Run full verification suite (core, runtime, hub, services, governance)
        run: npm run verify:all
      - name: Validate OLS lessons and data files
        run: node scripts/validate-schemas.js
      # Build all lessons, not just gravity.yaml [R10 P3.4]
      - name: Build all lessons
        run: |
          for f in lessons/*.yaml; do
            slug=$(basename "$f" .yaml)
            node src/cli.js "$f" --format=html --output="dist/${slug}.html"
          done
      # Verify data files unchanged after tests [R10 P5.7]
      - name: Check data directory cleanliness
        run: |
          sha256sum data/*.json > /tmp/data-before.sha
          npm run test:unit
          sha256sum --check /tmp/data-before.sha
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Initialize data files
        run: npm run init:data
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run e2e tests
        run: npm run test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
