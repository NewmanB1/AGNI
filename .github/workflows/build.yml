name: Build OLS Reference Bundles

on:
  push:
    branches: [main]
    paths:
      - 'lessons/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches: [main]
  workflow_dispatch:   # Allows manual trigger from GitHub UI

jobs:
  build:
    name: Build HTML & Native Outputs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci    # Uses package-lock.json for exact, clean installs

      - name: Run unit tests
        run: npm test

      - name: Verify canonical ownership (Phase 1)
        run: npm run verify:canonical

      - name: Build HTML format (browser/PWA)
        run: npm run build
        # This runs: node packages/agni-cli/cli.js lessons/gravity.yaml --format=html --output=dist/gravity.html

      - name: Build Native format (Markdown + JSON)
        run: npm run build:native
        # This runs: node packages/agni-cli/cli.js lessons/gravity.yaml --format=native --output-dir=dist/native-gravity

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ols-reference-bundles
          path: |
            dist/gravity.html
            dist/native-gravity/
          if-no-files-found: error
          retention-days: 7
