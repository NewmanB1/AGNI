<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OLS Lesson in iframe — AGNI Demo</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 1rem;
      background: #f5f5f5;
    }
    h1 { font-size: 1.25rem; margin: 0 0 0.5rem; }
    .info { font-size: 0.85rem; color: #555; margin-bottom: 1rem; }
    .frame-wrap {
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      height: calc(100vh - 8rem);
      min-height: 400px;
    }
    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: none;
    }
    .links { margin-top: 0.75rem; }
    .links a { margin-right: 1rem; font-size: 0.9rem; }
  </style>
</head>
<body>
  <h1>OLS Lesson in iframe</h1>
  <p class="info">
    This page embeds a compiled OLS lesson. Sensors (accelerometer, vibration) require HTTPS or localhost.
    Run <code>npm run build</code> first, then serve this directory (e.g. <code>npx serve . from repo root</code> or open via a local server).
  </p>
  <div class="frame-wrap">
    <iframe
      id="lesson-frame"
      src="../dist/gravity.html"
      title="Feeling Gravity — OLS lesson"
      allow="accelerometer; vibrate"
      sandbox="allow-scripts allow-same-origin allow-forms"
    ></iframe>
  </div>
  <div class="links">
    <a href="../dist/gravity.html">Open lesson standalone</a>
    <a href="https://github.com/NewmanB1/AGNI">AGNI repo</a>
    <a href="../docs/integrations/KOLIBRI-INTEGRATION-GUIDE.md">Kolibri integration guide</a>
  </div>
</body>
</html>
